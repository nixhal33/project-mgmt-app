# Define the order of execution for our pipeline stages
stages:
  - build
  - deploy
  - test

# Global defaults for our Docker-based jobs
default:
  image: docker:24.0.5
  services:
    - docker:24.0.5-dind

# -------------------------------------------------------------
# 1. BUILD STAGE: Build the React Docker image and push to GitLab Registry
# -------------------------------------------------------------
build_job:
  stage: build
  rules:
    - if: $CI_COMMIT_BRANCH == "main"   # Only run when pushing to the 'main' branch
  script:
    # GitLab automatically gives us these variables to log into its built-in registry
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
    # Build the image using the GitLab registry naming convention
    - docker build -t $CI_REGISTRY_IMAGE:main .
    # Push the finished image up to your project's storage room
    - docker push $CI_REGISTRY_IMAGE:main

# -------------------------------------------------------------
# 2. DEPLOY STAGE: SSH into your server and update the container
# -------------------------------------------------------------
deploy_job:
  stage: deploy
  image: alpine:latest  # A lightweight image with SSH tools for deployment
  services: []          # We don't need Docker-in-Docker for this stage
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
  before_script:
    # Set up the SSH agent so we can talk to your remote server safely
    - apk add --no-cache openssh-client
    - eval $(ssh-agent -s)
    - echo "$DEV_SSH_KEY" | tr -d '\r' | ssh-add -
    - mkdir -p ~/.ssh
    - chmod 700 ~/.ssh
    - ssh-keyscan -H "$DEV_HOST" >> ~/.ssh/known_hosts
  script:
    - |
      ssh $DEV_USER@$DEV_HOST "
        # Log into the GitLab Registry from your remote server
        docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY

        # Pull down the freshly built image
        docker pull $CI_REGISTRY_IMAGE:dev

        # If an old container exists, stop it and remove it
        if [ \$(docker ps -aq -f name=project-management-dev) ]; then
          docker stop project-management-dev
          docker rm project-management-dev
        fi

        # Run the new container on port 3000
        docker run -d \
          --name project-management-dev \
          --restart unless-stopped \
          -p 3000:80 \
          $CI_REGISTRY_IMAGE:dev

        # Clean up old unused images to save server disk space
        docker image prune -f
      "

# -------------------------------------------------------------
# 3. SMOKE TEST STAGE: Verify the website is up and running properly
# -------------------------------------------------------------
smoke_test_job:
  stage: test
  image: alpine:latest
  services: []
  rules:
    - if: $CI_COMMIT_BRANCH == "dev"
  script:
    - apk add --no-cache curl
    - echo "Waiting a few seconds for the React app to initialize..."
    - sleep 10
    - echo "Sending requests to http://$DEV_HOST:3000..."
    
    # Hit the app URL. If it fails or returns an error status code, the job fails.
    - curl --fail -sS http://$DEV_HOST:3000 > response.html
    
    # Look inside the downloaded HTML code to verify it contains standard React root elements
    - |
      if grep -q -E "id=\"root\"|<html>" response.html; then
        echo "✅ Smoke test passed! Your React app is serving HTML correctly on port 3000."
      else
        echo "❌ Smoke test failed! The server responded, but standard React entry hooks were missing."
        exit 1
      fi